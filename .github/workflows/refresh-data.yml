name: Refresh dashboard data

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # manual "Run workflow" button
  push:
    branches: [main]
    paths-ignore: ["dash-data.js"] # don't re-trigger on the data commit

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch real PR data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node fetch-data.mjs

      - name: Commit if the data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dash-data.js
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: refresh dash-data.js [skip ci]"
            git push
          fi
